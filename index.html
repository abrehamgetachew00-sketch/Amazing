<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Retro Snake | Nokia Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="nokia-shell">
        <div class="screen-border">
            <div class="lcd-screen">
                <header class="status-bar">
                    <span id="scoreDisplay">SCORE: 0000</span>
                    <span>HI: 9999</span>
                </header>

                <canvas id="snakeCanvas" width="400" height="300"></canvas>

                <div id="gameOverOverlay" class="hidden">
                    <h2>GAME OVER</h2>
                    <p>Press SPACE to Restart</p>
                </div>
            </div>
        </div>
        <div class="keypad-hint">Use Arrow Keys or WASD to navigate</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
